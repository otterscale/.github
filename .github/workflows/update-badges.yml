name: Update Release Badges

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest releases and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          readme="profile/README.md"

          repos=(
            otterscale
            dashboard
            api
            types
            fleet-operator
            model-operator
            module-operator
            tenant-operator
            workload-operator
            operator-template
            keycloakify
          )

          colors=(3b82f6 22c55e f97316 a855f7 ef4444 14b8a6 eab308 ec4899 6366f1 06b6d4)

          pick_color() {
            local ver="$1"
            local major="${ver%%.*}"
            local minor="${ver#*.}"
            local idx=$(( (major * 7 + minor) % ${#colors[@]} ))
            echo "${colors[$idx]}"
          }

          make_badge() {
            local ver="$1" label="$2"
            local minor msg color badge_img
            minor=$(echo "$ver" | sed 's/^v//; s/\([0-9]*\.[0-9]*\).*/\1/')
            color=$(pick_color "$minor")
            msg=$(echo "$ver" | sed 's/-/--/g; s/_/__/g')
            if [[ -n "$label" ]]; then
              badge_img="https://img.shields.io/badge/${msg}-${color}?label=${label}"
            else
              badge_img="https://img.shields.io/badge/${msg}-${color}"
            fi
            echo "$badge_img"
          }

          for name in "${repos[@]}"; do
            release_url="https://github.com/otterscale/${name}/releases"

            # Fetch latest stable release
            version=$(gh api "repos/otterscale/${name}/releases/latest" --jq '.tag_name' 2>/dev/null || true)

            # Fetch latest pre-release
            pre_version=$(gh api "repos/otterscale/${name}/releases" --jq '[.[] | select(.prerelease == true and .draft == false)][0].tag_name' 2>/dev/null || true)

            badges=""

            # Build stable release badge
            if [[ "$version" =~ ^v?[0-9]+\.[0-9]+ ]]; then
              badge_img=$(make_badge "$version")
              badges="[![${version}](${badge_img})](${release_url})"
              echo "✓ ${name}: release ${version}"
            fi

            # Build pre-release badge if it exists and differs from stable
            if [[ "$pre_version" =~ ^v?[0-9]+\.[0-9]+ ]] && [[ "$pre_version" != "$version" ]]; then
              pre_badge_img=$(make_badge "$pre_version" "pre")
              if [[ -n "$badges" ]]; then
                badges="${badges} [![${pre_version}](${pre_badge_img})](${release_url})"
              else
                badges="[![${pre_version}](${pre_badge_img})](${release_url})"
              fi
              echo "✓ ${name}: pre-release ${pre_version}"
            fi

            # Fallback to alpha if no releases found
            if [[ -z "$badges" ]]; then
              echo "✗ ${name}: no valid release found, marking as alpha"
              badge_img="https://img.shields.io/badge/alpha-lightgrey"
              badges="[![alpha](${badge_img})](${release_url})"
            fi

            sed -i "\|${release_url}|s|<sub>.*</sub>|<sub>${badges}</sub>|" "$readme"
          done

      - name: Commit and push if changed
        run: |
          git diff --quiet profile/README.md && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git commit -m "chore: update release badges"
          git push
